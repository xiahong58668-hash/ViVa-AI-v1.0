# 工作流名称：同步上游 ViVa-AI-v1.0 仓库
name: Sync ViVa-AI-v1.0 Upstream

# 触发条件：每天UTC 0点（北京时间8点） + 手动触发（方便测试）
on:
  schedule:
    - cron: '0 0 * * *'  # 定时规则：分 时 日 月 周（UTC时区）
  workflow_dispatch:     # 手动触发开关（测试用）

# 执行的同步任务
jobs:
  sync-upstream:
    runs-on: ubuntu-latest  # 运行环境：Ubuntu 最新版
    permissions:
      contents: write       # 授予推送代码的权限（必须）

    steps:
      # 步骤1：检出你的 Fork 仓库代码
      - name: Checkout Fork Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取所有历史提交，避免合并冲突

      # 步骤2：配置 Git 身份（GitHub Actions 提交代码需要）
      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # 步骤3：添加上游仓库地址（已替换为你的上游仓库）
      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/vivaapi/ViVa-AI-v1.0.git

      # 步骤4：拉取上游仓库的最新代码
      - name: Fetch Upstream Changes
        run: git fetch upstream

      # 步骤5：切换到主分支并合并上游代码
      - name: Merge Upstream to Main
        run: |
          git checkout main  # 切换到你的 Fork 仓库主分支（若为 master 则改为 master）
          git merge upstream/main --no-edit  # 合并上游 main 分支，自动确认提交信息

      # 步骤6：推送合并后的代码到你的 Fork 仓库
      - name: Push to Fork Repository
        run: git push origin main
